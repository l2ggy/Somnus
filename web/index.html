<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Somnus</title>
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/home.css" />
  </head>
  <body>
    <main class="home-screen" aria-label="Somnus home screen">
      <img
        class="home-screen__background"
        src="/assets/BackgroundPortraitDarker.svg"
        alt=""
        aria-hidden="true"
      />

      <section
        class="home-screen__content home-screen__content--intro"
        aria-label="Welcome"
        id="intro-screen"
        tabindex="0"
        role="button"
      >
        <img
          class="home-screen__logo anim-pop-in"
          style="--anim-delay: 220ms"
          src="/assets/Logo.svg"
          alt="Somnus"
          width="230"
          height="71"
        />

        <p class="home-screen__prompt anim-pop-in anim-pulse" style="--anim-delay: 420ms">Tap to begin</p>
      </section>
    </main>

    <script>
      const introScreen = document.getElementById('intro-screen');

      function goToMenuScreen() {
        window.location.href = '/menu.html';
      }

      if (introScreen) {
        introScreen.addEventListener('click', goToMenuScreen);
        introScreen.addEventListener('touchstart', goToMenuScreen, { passive: true });
        introScreen.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            goToMenuScreen();
          }
        });
      }
    </script>
  </body>
</html>
