<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Somnus</title>
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/home.css" />
  </head>
  <body>
    <main class="app-shell home-screen" aria-label="Somnus home screen">
      <img
        class="home-screen__background"
        src="./assets/BackgroundPortrait.svg"
        alt="Night sky background"
      />

      <section class="home-screen__content">
        <img class="home-screen__logo" src="./assets/Logo.svg" alt="Somnus logo" />
        <p class="home-screen__prompt">Tap to start</p>
      </section>
    </main>
  </body>
</html>
