<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="/styles/base.css" />

  <body>
    <main class="option-screen" aria-label="Somnus option page">
      <img
        class="option-screen__background anim-fade-in"
        style="--anim-delay: 80ms"

        alt=""

      />

        </header>

        <div class="option-screen__body anim-pop-in" style="--anim-delay: 220ms">
          <h1 class="option-screen__title">Begin Sleep</h1>
          <p class="option-screen__subtitle">This page is ready for the next content section.</p>
          <a href="/menu.html" class="option-screen__back-link">Back to Menu</a>
